<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Camí d’aprenentatge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app"></div>

<script>
const levels = [
  { id: 1, lesson: "subjuntiu", name: "Subjuntiu" },
  { id: 2, lesson: "interferencies", name: "Interferències" }
];

let progress = JSON.parse(localStorage.getItem("c1_progress")) || {
  completed: [],
  xp: 0
};

function render() {
  const html = levels.map((lvl, i) => {

    let status = "locked";

    if (progress.completed.includes(lvl.id)) {
      status = "completed";
    } else if (i === 0 || progress.completed.includes(levels[i-1].id)) {
      status = "available";
    }

    return `
      <div class="card">
        <h3>${lvl.name}</h3>
        <p>Estat: ${status}</p>
        <button onclick="openLevel(${lvl.id})" ${status==="locked"?"disabled":""}>
          Entrar
        </button>
      </div>
    `;
  }).join("");

  document.getElementById("app").innerHTML = `
    <div class="content">
      <h2>🧭 Camí d’aprenentatge</h2>
      ${html}
      <button onclick="goHome()">🏠 Inici</button>
    </div>
  `;
}

function openLevel(id) {
  const level = levels.find(l => l.id === id);
  window.location.href = "index.html?lesson=" + level.lesson + "&levelId=" + id;
}

function goHome() {
  window.location.href = "index.html";
}

render();
</script>

</body>
</html>
